<!DOCTYPE html><html><head><meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#fff0fc;height:100vh;overflow:hidden}
:root{
  --p-bg:#fef0fa;--p-soft:#f5c8ef;--p-mid:#d966c0;--p-dark:#8b3a7e;
  --cc-bg:#fff4e6;--cc-soft:#ffd9a0;--cc-mid:#e8860a;--cc-dark:#7a4400;
  --sev-bg:#edfaf4;--sev-soft:#b8f0d8;--sev-mid:#1D9E75;--sev-dark:#0F6E56;
  --border:#fce4f7;--border2:#f0b8e8;
  --bg:#fff;--bg2:#fff8fe;--bg3:#fdf0fb;
  --txt:#3a1f38;--txt2:#8a5585;--txt3:#c4a0be;
  --red:#E24B4A;--r-pill:999px;--r-sm:10px;--r:14px;
}
.app{display:flex;height:100vh}
.sidebar{width:270px;min-width:270px;background:var(--bg);border-right:1.5px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
.sb-brand{padding:12px 14px 10px;display:flex;align-items:center;gap:8px;border-bottom:1.5px solid var(--border)}
.brand-icon{width:36px;height:36px;border-radius:12px;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.brand-name{font-size:14px;font-weight:500;color:var(--txt)}
.brand-sub{font-size:10px;color:var(--txt3);margin-top:1px}
.sb-top{padding:10px 12px 8px;border-bottom:1.5px solid var(--border)}
.ws-row{display:flex;gap:4px}
.ws-btn{flex:1;padding:5px 3px;font-size:10.5px;font-weight:500;border-radius:var(--r-pill);border:1.5px solid transparent;cursor:pointer;background:transparent;color:var(--txt2);transition:all .15s}
.ws-btn:hover{background:var(--bg3)}
.ws-btn.sel-personal{background:var(--p-bg);color:var(--p-dark);border-color:var(--p-soft)}
.ws-btn.sel-cc{background:var(--cc-bg);color:var(--cc-dark);border-color:var(--cc-soft)}
.ws-btn.sel-sev{background:var(--sev-bg);color:var(--sev-dark);border-color:var(--sev-soft)}
.ws-btn.sel-all{background:var(--bg3);color:var(--txt);border-color:var(--border2)}
.sb-scroll{flex:1;overflow-y:auto;padding:0 0 16px}
.sb-scroll::-webkit-scrollbar{width:3px}
.sb-scroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.day-bucket{border-bottom:1px solid var(--border)}
.day-bucket-head{display:flex;align-items:center;gap:7px;padding:8px 12px 6px;cursor:pointer;user-select:none}
.day-bucket-head:hover{background:var(--bg3)}
.day-num-badge{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.day-num-badge.today{background:var(--p-mid);color:#fff}
.day-num-badge:not(.today){background:var(--bg3);color:var(--txt2)}
.day-label{font-size:12px;font-weight:500;color:var(--txt);flex:1}
.day-count{font-size:10px;color:var(--txt3);background:var(--bg3);padding:1px 6px;border-radius:var(--r-pill)}
.day-chevron{font-size:9px;color:var(--txt3)}
.day-bucket-body{padding:2px 8px 6px}
.pri-group{margin-bottom:2px}
.pri-group-label{display:flex;align-items:center;gap:4px;padding:2px 4px;font-size:9.5px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.pri-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.task{display:flex;align-items:flex-start;gap:6px;padding:4px 6px;border-radius:var(--r-sm);cursor:grab;font-size:12px;color:var(--txt);transition:background .1s;position:relative;margin:1px 0}
.task:hover{background:var(--bg3)}
.task:hover .task-acts{display:flex}
.task.dragging{opacity:.3}
.task.drag-over{outline:2px dashed var(--p-mid)}
.chk{width:15px;height:15px;border-radius:50%;border:2px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.chk:hover{border-color:var(--p-mid)}
.chk.done{background:var(--p-soft);border-color:var(--p-mid)}
.chk.done::after{content:'';display:block;width:4px;height:2.5px;border-left:1.5px solid var(--p-dark);border-bottom:1.5px solid var(--p-dark);transform:rotate(-45deg) translate(1px,-1px)}
.task-body{flex:1;min-width:0}
.tname{line-height:1.4;font-size:12px}
.tname.done{text-decoration:line-through;color:var(--txt3)}
.ws-badge{font-size:9px;padding:1px 5px;border-radius:var(--r-pill);margin-right:3px;font-weight:500;vertical-align:middle}
.sub-list{margin-top:3px}
.sub-row{display:flex;align-items:center;gap:5px;font-size:10.5px;color:var(--txt2);padding:2px 0 2px 3px}
.sub-chk{width:11px;height:11px;border-radius:3px;border:1.5px solid var(--border2);flex-shrink:0;cursor:pointer}
.sub-chk:hover{border-color:var(--p-mid)}
.sub-chk.done{background:var(--p-soft);border-color:var(--p-mid)}
.sub-del{font-size:9px;color:var(--txt3);cursor:pointer;padding:0 3px;margin-left:auto}
.sub-del:hover{color:var(--red)}
.sub-add{font-size:10px;color:var(--txt3);cursor:pointer;padding:2px 3px;border-radius:4px;margin-top:1px;display:inline-block}
.sub-add:hover{background:var(--p-bg);color:var(--p-dark)}
.sub-hint{font-size:10px;color:var(--txt3);margin-top:1px;cursor:pointer}
.exp-btn{font-size:9px;color:var(--txt3);cursor:pointer;padding:1px 2px;border-radius:3px;flex-shrink:0;margin-top:2px}
.task-acts{display:none;position:absolute;right:4px;top:50%;transform:translateY(-50%);gap:2px;align-items:center;background:var(--bg);border-radius:6px;padding:2px;border:1px solid var(--border2);z-index:10}
.act{width:20px;height:20px;border-radius:4px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--txt2)}
.act:hover{background:var(--bg3)}
.act.del:hover{background:#fff0f0;color:var(--red)}
.unsched-section{padding:6px 12px 8px;border-bottom:1px solid var(--border)}
.unsched-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.unsched-label{font-size:10px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:5px}
.unsched-hint{font-size:10px;color:var(--txt3);padding:2px 4px;font-style:italic}
.sec-add{font-size:15px;color:var(--txt3);cursor:pointer;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;background:transparent}
.sec-add:hover{background:var(--p-bg);color:var(--p-dark)}
.add-row{display:flex;align-items:center;gap:7px;padding:6px 12px;font-size:12px;color:var(--txt3);cursor:pointer;border-radius:var(--r-sm);margin:4px 8px 0}
.add-row:hover{background:var(--p-bg);color:var(--p-dark)}
.add-plus{width:17px;height:17px;border-radius:50%;border:1.5px dashed var(--border2);display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.add-row:hover .add-plus{border-color:var(--p-mid);border-style:solid}
.divider{height:1px;background:var(--border);margin:4px 12px}
.sub-input-row{display:flex;align-items:center;gap:4px;margin-top:3px;padding:1px 0}
.sub-inline-input{flex:1;padding:3px 7px;font-size:11px;border:1.5px solid var(--p-soft);border-radius:var(--r-pill);background:var(--p-bg);color:var(--txt);outline:none;font-family:inherit}
.sub-inline-input:focus{border-color:var(--p-mid)}
.sub-inline-ok{padding:2px 7px;font-size:11px;border:1.5px solid var(--p-mid);border-radius:var(--r-pill);background:var(--p-mid);color:#fff;cursor:pointer;font-family:inherit;flex-shrink:0}
.sub-inline-cancel{padding:2px 5px;font-size:11px;border:1px solid var(--border2);border-radius:var(--r-pill);background:transparent;color:var(--txt3);cursor:pointer;font-family:inherit;flex-shrink:0}
.dump-row{display:flex;align-items:center;gap:6px;padding:3px 6px;border-radius:var(--r-sm);font-size:11.5px;color:var(--txt2);position:relative;margin:1px 0}
.dump-row:hover{background:var(--bg3)}
.dump-row:hover .dump-acts{display:flex}
.dump-text{flex:1;line-height:1.4}
.dump-acts{display:none;gap:2px;align-items:center;background:var(--bg);border-radius:5px;padding:1px;border:1px solid var(--border2);z-index:10}
.dump-input-row{display:flex;gap:5px;padding:4px 6px 5px;align-items:center}
.dump-input{flex:1;padding:5px 9px;font-size:11.5px;border:1.5px solid var(--border2);border-radius:var(--r-pill);background:var(--bg2);color:var(--txt);outline:none;font-family:inherit}
.dump-input:focus{border-color:var(--p-mid);background:var(--bg)}
.dump-add-btn{width:24px;height:24px;border-radius:50%;border:1.5px solid var(--p-soft);background:var(--p-bg);color:var(--p-dark);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dump-add-btn:hover{background:var(--p-soft)}
.overlay{display:none;position:absolute;inset:0;background:rgba(45,42,64,.28);z-index:200;align-items:center;justify-content:center}
.overlay.open{display:flex}
.modal{background:var(--bg);border-radius:16px;padding:22px;width:310px;border:1.5px solid var(--border);max-height:92vh;overflow-y:auto}
.modal h3{font-size:13.5px;font-weight:500;margin-bottom:14px;color:var(--txt)}
.modal label{font-size:10.5px;color:var(--txt2);font-weight:500;display:block;margin-bottom:3px;margin-top:8px}
.modal label:first-of-type{margin-top:0}
.modal input,.modal select{width:100%;padding:8px 11px;font-size:12.5px;border:1.5px solid var(--border2);border-radius:var(--r-sm);background:var(--bg2);color:var(--txt);outline:none;font-family:inherit}
.modal input:focus,.modal select:focus{border-color:var(--p-mid);background:var(--bg)}
.two-col{display:flex;gap:8px}
.two-col>*{flex:1}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.swatch.sel{border-color:var(--txt);transform:scale(1.2)}
.swatch:hover:not(.sel){transform:scale(1.1)}
.repeat-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.rchip{padding:4px 10px;font-size:11px;border-radius:var(--r-pill);border:1.5px solid var(--border2);cursor:pointer;background:transparent;color:var(--txt2);font-family:inherit;transition:all .12s}
.rchip.sel{background:var(--p-bg);color:var(--p-dark);border-color:var(--p-soft)}
.modal-btns{display:flex;gap:8px;justify-content:space-between;align-items:center;margin-top:16px}
.btn-del{padding:7px 13px;font-size:12px;border:1.5px solid #fcc;border-radius:var(--r-pill);cursor:pointer;background:#fff5f5;color:var(--red);font-family:inherit}
.btn-del:hover{background:#ffe0e0}
.btn-cancel{padding:7px 15px;font-size:12px;border:1.5px solid var(--border2);border-radius:var(--r-pill);cursor:pointer;background:transparent;color:var(--txt2);font-family:inherit}
.btn-save{padding:7px 15px;font-size:12px;border:1.5px solid var(--p-mid);border-radius:var(--r-pill);cursor:pointer;background:var(--p-mid);color:#fff;font-weight:500;font-family:inherit}
.btn-save:hover{background:var(--p-dark)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0;background:var(--bg2)}
.cal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1.5px solid var(--border);background:var(--bg);flex-shrink:0}
.cal-nav{display:flex;align-items:center;gap:8px}
.nbtn{background:none;border:1.5px solid var(--border2);border-radius:var(--r-pill);width:28px;height:28px;cursor:pointer;color:var(--txt2);font-size:13px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.nbtn:hover{background:var(--p-bg);border-color:var(--p-soft);color:var(--p-dark)}
.cal-title{font-size:15px;font-weight:500;color:var(--txt)}
.wk-tag{font-size:10.5px;color:var(--txt3);margin-left:5px;font-weight:400;background:var(--bg3);padding:2px 7px;border-radius:var(--r-pill);border:1px solid var(--border)}
.view-toggle{display:flex;gap:3px;background:var(--bg3);border-radius:var(--r-pill);padding:3px}
.vtab{padding:6px 16px;font-size:12.5px;font-weight:500;border-radius:var(--r-pill);border:none;cursor:pointer;background:transparent;color:var(--txt2);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
.vtab.active{background:var(--bg);color:var(--txt)}
.legend{display:flex;gap:6px;align-items:center}
.leg-item{display:flex;align-items:center;gap:3px;padding:3px 8px;border-radius:var(--r-pill);font-size:10px;font-weight:500}
.cal-body{flex:1;display:flex;overflow:hidden}
.time-col{width:52px;flex-shrink:0;border-right:1.5px solid var(--border);display:flex;flex-direction:column;background:var(--bg)}
.time-col-head{height:50px;flex-shrink:0;border-bottom:1.5px solid var(--border)}
.tscroll{flex:1;overflow-y:auto}
.tscroll::-webkit-scrollbar{display:none}
.tslot{height:54px;display:flex;align-items:flex-start;justify-content:flex-end;padding-right:8px;padding-top:2px}
.tslot span{font-size:9.5px;color:var(--txt3);font-weight:500}
.days-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.days-head{display:flex;border-bottom:1.5px solid var(--border);flex-shrink:0;background:var(--bg)}
.dhcell{flex:1;min-width:0;padding:7px 4px;text-align:center;border-right:1px solid var(--border)}
.dhcell:last-child{border-right:none}
.dname{font-size:9.5px;color:var(--txt3);font-weight:500;margin-bottom:3px;letter-spacing:.05em;text-transform:uppercase}
.dnum{font-size:14px;font-weight:500;color:var(--txt);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto}
.dnum.today{background:var(--p-mid);color:#fff}
.allday-wrap{display:flex;border-bottom:1.5px solid var(--border);flex-shrink:0;background:var(--bg)}
.allday-gutter{width:52px;flex-shrink:0;border-right:1.5px solid var(--border);display:flex;align-items:center;justify-content:flex-end;padding-right:6px}
.allday-lbl{font-size:8px;color:var(--txt3);font-weight:500;text-transform:uppercase;text-align:right}
.allday-cells{flex:1;display:flex}
.adcell{flex:1;min-width:0;border-right:1px solid var(--border);padding:3px;display:flex;flex-direction:column;gap:2px;cursor:pointer;min-height:24px}
.adcell:hover{background:var(--bg3)}
.adcell:last-child{border-right:none}
.adchip{font-size:9px;padding:2px 6px;border-radius:var(--r-pill);white-space:nowrap;overflow:hidden;max-width:100%;text-overflow:ellipsis;font-weight:500;cursor:pointer}
.dscroll{flex:1;overflow-y:auto;display:flex}
.dscroll::-webkit-scrollbar{width:3px}
.dscroll::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.dcol{flex:1;min-width:0;border-right:1px solid var(--border);position:relative;background:var(--bg);cursor:crosshair;user-select:none}
.dcol:last-child{border-right:none}
.dcol.today-col{background:#fdfbff}
.dcol.drag-over-col{background:#f0effe}
.hline{position:absolute;left:0;right:0;height:1px;background:var(--border);pointer-events:none}
.hline.half{opacity:.35}
.cevent{position:absolute;left:3px;right:3px;border-radius:var(--r-sm);padding:3px 6px;font-size:10.5px;font-weight:500;cursor:pointer;overflow:hidden;line-height:1.3;border:1.5px solid;z-index:2}
.cevent:hover{filter:brightness(.95)}
.cevent:hover .ev-del{display:flex}
.ev-del{display:none;position:absolute;top:2px;right:2px;width:15px;height:15px;border-radius:50%;background:rgba(255,255,255,.9);border:none;cursor:pointer;font-size:9px;align-items:center;justify-content:center;color:var(--red);line-height:1}
.repeat-badge{font-size:8px;opacity:.65;margin-top:1px}
.now-line{position:absolute;left:0;right:0;height:2px;background:#D4537E;z-index:3;border-radius:1px;pointer-events:none}
.now-dot{position:absolute;left:-4px;top:-4px;width:9px;height:9px;border-radius:50%;background:#D4537E}
.ghost{position:absolute;left:3px;right:3px;border-radius:var(--r-sm);background:var(--p-bg);border:1.5px dashed var(--p-mid);pointer-events:none;z-index:4;opacity:.8}
.time-hint{position:absolute;left:4px;font-size:9px;color:var(--p-dark);background:var(--p-bg);padding:1px 5px;border-radius:4px;pointer-events:none;z-index:5;white-space:nowrap;border:1px solid var(--p-soft)}
.wov-wrap{flex:1;overflow-y:auto;padding:16px 18px}
.wov-wrap::-webkit-scrollbar{width:3px}
.wov-stats{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.wov-stat{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 14px;flex:1;min-width:90px}
.wov-stat-num{font-size:20px;font-weight:500;color:var(--txt);display:block;line-height:1.2;margin-bottom:2px}
.wov-stat-lbl{font-size:11px;color:var(--txt2)}
.wov-stat-bar{height:3px;border-radius:2px;background:var(--border);margin-top:6px}
.wov-stat-fill{height:100%;border-radius:2px;background:var(--p-mid)}
.wov-section-title{font-size:10.5px;font-weight:500;color:var(--txt2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em;display:flex;align-items:center;gap:6px}
.wov-section-title::after{content:'';flex:1;height:1px;background:var(--border)}
.wov-grid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:8px;margin-top:4px}
.wov-day{background:var(--bg);border-radius:var(--r);border:1.5px solid var(--border);overflow:hidden;min-height:140px;transition:border-color .15s,background .15s}
.wov-day.drag-target{border-color:var(--p-mid);background:var(--p-bg)}
.wov-day-head{padding:7px 8px 5px;border-bottom:1.5px solid var(--border);display:flex;align-items:center;gap:5px}
.wov-dname{font-size:9.5px;font-weight:500;color:var(--txt2);text-transform:uppercase;letter-spacing:.05em;flex:1}
.wov-dnum{font-size:13px;font-weight:500;color:var(--txt);width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.wov-dnum.today{background:var(--p-mid);color:#fff}
.wov-tasks{padding:5px 5px 4px}
.wov-task{display:flex;align-items:flex-start;gap:4px;padding:3px 4px;border-radius:5px;font-size:11px;color:var(--txt);margin:1px 0;position:relative}
.wov-task:hover{background:var(--bg3)}
.wov-task:hover .wov-del{display:flex}
.wov-chk{width:12px;height:12px;border-radius:50%;border:1.5px solid var(--border2);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.wov-chk:hover{border-color:var(--p-mid)}
.wov-chk.done{background:var(--p-soft);border-color:var(--p-mid)}
.wov-chk.done::after{content:'';display:block;width:4px;height:2.5px;border-left:1.5px solid var(--p-dark);border-bottom:1.5px solid var(--p-dark);transform:rotate(-45deg) translate(1px,-1px)}
.wov-pri{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px}
.wov-tname{flex:1;line-height:1.4;font-size:11px}
.wov-tname.done{text-decoration:line-through;color:var(--txt3)}
.wov-del{display:none;position:absolute;right:2px;top:50%;transform:translateY(-50%);width:15px;height:15px;border-radius:4px;border:none;background:rgba(255,255,255,.9);cursor:pointer;font-size:9px;align-items:center;justify-content:center;color:var(--red)}
.wov-empty{font-size:10px;color:var(--txt3);padding:4px 5px;font-style:italic}
.wov-drop-hint{font-size:9.5px;color:var(--p-dark);padding:4px 5px;border:1px dashed var(--p-soft);border-radius:5px;text-align:center;margin-top:2px;display:none}
.wov-day.drag-target .wov-drop-hint{display:block}
.unsched-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:4px}
.unsched-pill{display:flex;align-items:center;gap:5px;background:var(--bg);border:1.5px solid var(--border);border-radius:var(--r-pill);padding:4px 10px;font-size:11px;color:var(--txt);cursor:grab;user-select:none}
.unsched-pill:hover{border-color:var(--border2)}
.unsched-pill.dragging{opacity:.3}
.pri-pip{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.focus-wrap{flex:1;overflow-y:auto;padding:20px 24px}
.focus-empty{text-align:center;padding:60px 24px;color:var(--txt3)}
.focus-empty-icon{font-size:36px;margin-bottom:12px}

// Use real local time (WET = UTC+0, WEST = UTC+1 in summer)
const _TODAY=new Date();
function getWeekDates(off){
  const now=_TODAY,dow=now.getDay();
  const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1)+off*7);
  return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function isToday(d){return d.getDate()===_TODAY.getDate()&&d.getMonth()===_TODAY.getMonth()&&d.getFullYear()===_TODAY.getFullYear();}
function snapH(h){return Math.round(h*4)/4;}
function fmtH(h){const hh=Math.floor(h),mm=Math.round((h%1)*60);return `${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;}
function parseH(s){const[h,m]=s.split(':').map(Number);return h+m/60;}
function hourToPx(h){return (h-H_START)*HH;}
function pxToHour(px){return H_START+(px/HH);}
function getWkNum(d){const j=new Date(d.getFullYear(),0,1);return Math.ceil(((d-j)/86400000+j.getDay()+1)/7);}
function repeatIcon(r){return r==='daily'?'↻ daily':r==='weekly'?'↻ weekly':r==='monthly'?'↻ monthly':'';}
function getColor(id){return COLORS.find(c=>c.id===id)||COLORS[0];}

function setWS(w){
  curWS=w;
  ['all','personal','cc','sev'].forEach(x=>{
    const b=document.getElementById('tab-'+x);if(b)b.className='ws-btn'+(x===w?' sel-'+w:'');
  });
  renderSidebar();renderLegend();
  if(curView==='cal')renderCal();
  else if(curView==='week')renderWeeklyView();
  else renderFocusView();
}

function switchView(v){
  curView=v;
  ['cal','week','focus'].forEach(x=>{
    const b=document.getElementById('vtab-'+x);if(b)b.classList.toggle('active',x===v);
  });
  document.getElementById('cal-body').style.display=v==='cal'?'flex':'none';
  document.getElementById('weekly-view').style.display=v==='week'?'block':'none';
  document.getElementById('focus-view').style.display=v==='focus'?'block':'none';
  document.getElementById('cal-hint').style.display=v==='cal'?'':'none';
  if(v==='cal')renderCal();
  else if(v==='week')renderWeeklyView();
  else renderFocusView();
}

// ── FIX 3+4: priority groups for all workspaces including CC ──
// Sidebar render: use same pri group logic for all workspaces
function renderSidebar(){
  const vis=tasks.filter(t=>curWS==='all'||t.ws===curWS);
  const dates=getWeekDates(wkOff);
  let html='';
  const unsched=vis.filter(t=>t.dayAssign==null&&!t.done);
  html+=`<div class="unsched-section">
    <div class="unsched-head">
      <span class="unsched-label">
        <img src="https://raw.githubusercontent.com/coloredcaramel/plansy/main/sticker-candy.png" style="width:14px;height:14px;object-fit:contain;vertical-align:middle" onerror="this.outerHTML='🍬'"/>
        Unscheduled <span style="background:var(--bg3);color:var(--txt2);padding:1px 6px;border-radius:999px;font-size:9px">${unsched.length}</span>
      </span>
      <button class="sec-add" onclick="openAddTask('todo')">+</button>
    </div>`;
  if(unsched.length){
    ['high','med','low','todo'].forEach(g=>{
      const gt=unsched.filter(t=>t.pri===g);if(!gt.length)return;
      html+=`<div class="pri-group"><div class="pri-group-label"><div class="pri-dot" style="background:${PRI[g].dot}"></div>${PRI[g].label}</div>`;
      gt.forEach(t=>{html+=taskRowHtml(t);});
      html+=`</div>`;
    });
  } else {
    html+=`<div class="unsched-hint">No unscheduled tasks</div>`;
  }
  html+=`</div>`;

  DAYS.forEach((day,di)=>{
    const dt=vis.filter(t=>t.dayAssign===di&&!t.done);
    const open=dt.length>0||isToday(dates[di]);
    html+=`<div class="day-bucket">
      <div class="day-bucket-head" onclick="toggleBucket(${di})">
        <div class="day-num-badge${isToday(dates[di])?' today':''}">${dates[di].getDate()}</div>
        <span class="day-label">${day}</span>
        ${dt.length?`<span class="day-count">${dt.length}</span>`:''}
        <span class="day-chevron" id="chev-${di}">${open?'▲':'▼'}</span>
      </div>
      <div id="dbody-${di}" style="display:${open?'block':'none'}">
        <div class="day-bucket-body">`;
    if(dt.length){
      ['high','med','low','todo'].forEach(g=>{
        const gt=dt.filter(t=>t.pri===g);if(!gt.length)return;
        html+=`<div class="pri-group"><div class="pri-group-label"><div class="pri-dot" style="background:${PRI[g].dot}"></div>${PRI[g].label}</div>`;
        gt.forEach(t=>{html+=taskRowHtml(t);});
        html+=`</div>`;
      });
    } else {
      html+=`<div class="unsched-hint">Nothing yet — drag here from weekly view</div>`;
    }
    html+=`<div class="add-row" style="margin:2px 0 0;padding:3px 2px" onclick="openAddTask('todo',${di})"><div class="add-plus" style="width:14px;height:14px;font-size:10px">+</div><span style="font-size:11px">add task</span></div>`;
    html+=`</div></div></div>`;
  });

  const done=vis.filter(t=>t.done);
  if(done.length){
    html+=`<div class="divider"></div><div class="unsched-section" style="border-bottom:none">
      <div class="unsched-head"><span class="unsched-label">
        <img src="https://raw.githubusercontent.com/coloredcaramel/plansy/main/heart-sticker-pink.png" style="width:16px;height:16px;object-fit:contain;vertical-align:middle;margin-right:3px" onerror="this.outerHTML='💖'"/>
        Done <span style="background:var(--bg3);color:var(--txt2);padding:1px 6px;border-radius:999px;font-size:9px">${done.length}</span>
      </span></div>`;
    done.forEach(t=>{html+=taskRowHtml(t);});
    html+=`</div>`;
  }
  html+=dumpHtml();
  html+=`<div class="add-row" onclick="openAddTask('todo')"><div class="add-plus">+</div><span>Add task</span></div>`;
  document.getElementById('sb-scroll').innerHTML=html;
  attachTaskDrag();
}

function taskRowHtml(t){
  const wc=WS[t.ws],hs=t.subs&&t.subs.length,dc=hs?t.subs.filter(s=>s.done).length:0;
  return `<div class="task" draggable="true" data-id="${t.id}">
    <div class="chk${t.done?' done':''}" onclick="toggleDone(${t.id})"></div>
    <div class="task-body">
      <div class="tname${t.done?' done':''}">
        ${curWS==='all'?`<span class="ws-badge" style="background:${wc.soft};color:${wc.dark}">${wc.label}</span>`:''}${t.name}
      </div>
      ${hs?`<div style="display:${t.ex?'block':'none'}">
        <div class="sub-list">${t.subs.map(s=>`<div class="sub-row">
          <div class="sub-chk${s.done?' done':''}" onclick="toggleSub(${t.id},${s.id})"></div>
          <span style="flex:1;${s.done?'text-decoration:line-through;color:var(--txt3)':'color:var(--txt2)'}">${s.name}</span>
          <span class="sub-del" onclick="delSub(${t.id},${s.id})">✕</span>
        </div>`).join('')}</div>
        <div class="sub-add" onclick="addSub(${t.id})">+ add subtask</div>
      </div>
      <div class="sub-hint" onclick="toggleEx(${t.id})" style="display:${t.ex?'none':'block'}">${dc}/${t.subs.length} · expand</div>`
      :`<div class="sub-add" onclick="addSub(${t.id})">+ sub</div>`}
    </div>
    ${hs?`<div class="exp-btn" onclick="toggleEx(${t.id})">${t.ex?'▲':'▼'}</div>`:''}
    <div class="task-acts">
      <button class="act" onmousedown="event.stopPropagation();openEditTask(${t.id})">✏️</button>
      <button class="act del" onmousedown="event.stopPropagation();delTask(${t.id})">🗑</button>
    </div>
  </div>`;
}

function dumpHtml(){
  const items=dump.filter(d=>curWS==='all'||d.ws===curWS);
  return `<div class="divider"></div>
  <div class="unsched-section" style="border-bottom:none">
    <div class="unsched-head" onclick="toggleDump()" style="cursor:pointer">
      <span class="unsched-label">
        <img src="https://raw.githubusercontent.com/coloredcaramel/plansy/main/sticker-star.png" style="width:14px;height:14px;object-fit:contain;vertical-align:middle" onerror="this.outerHTML='🗂'"/>
        Brain dump <span style="background:#f4f1fc;color:#7a7590;padding:1px 6px;border-radius:999px;font-size:9px">${items.length}</span>
      </span>
      <span style="font-size:9px;color:var(--txt3)">${dumpOpen?'▲':'▼'}</span>
    </div>
    ${dumpOpen?`<div>
      ${items.map(d=>`<div class="dump-row">
        <span class="dump-text">${curWS==='all'?`<span class="ws-badge" style="background:${WS[d.ws].soft};color:${WS[d.ws].dark}">${WS[d.ws].label}</span>`:''}${d.text}</span>
        <div class="dump-acts">
          <button class="act" onmousedown="event.stopPropagation();promoteDump(${d.id})">↑</button>
          <button class="act del" onmousedown="event.stopPropagation();delDump(${d.id})">🗑</button>
        </div>
      </div>`).join('')}
      <div class="dump-input-row">
        <input class="dump-input" id="dump-input" placeholder="brain dump anything…" onkeydown="if(event.key==='Enter')addDump()"/>
        <button class="dump-add-btn" onclick="addDump()">+</button>
      </div>
    </div>`:''}
  </div>`;

function toggleBucket(di){
  const b=document.getElementById('dbody-'+di),c=document.getElementById('chev-'+di);
  if(!b)return;const open=b.style.display==='block';
  b.style.display=open?'none':'block';if(c)c.textContent=open?'▼':'▲';
}
function toggleDump(){dumpOpen=!dumpOpen;renderSidebar();}

function attachTaskDrag(){
  document.querySelectorAll('.task').forEach(el=>{
    el.addEventListener('dragstart',e=>{taskDragId=+el.dataset.id;e.dataTransfer.setData('text/plain',String(taskDragId));setTimeout(()=>el.classList.add('dragging'),0);});
    el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('.task.drag-over').forEach(x=>x.classList.remove('drag-over'));});
    el.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('.task.drag-over').forEach(x=>x.classList.remove('drag-over'));if(+el.dataset.id!==taskDragId)el.classList.add('drag-over');});
    el.addEventListener('drop',e=>{e.preventDefault();const si=tasks.findIndex(x=>x.id===taskDragId),di=tasks.findIndex(x=>x.id===+el.dataset.id);if(si>=0&&di>=0&&si!==di){const[m]=tasks.splice(si,1);tasks.splice(di,0,m);}taskDragId=null;renderSidebar();});
  });
}

function toggleDone(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;if(t.done)t.pri='done';}renderSidebar();if(curView==='week')renderWeeklyView();}
function toggleSub(tid,sid){const t=tasks.find(x=>x.id===tid);if(t){const s=t.subs.find(x=>x.id===sid);if(s)s.done=!s.done;}renderSidebar();}
function toggleEx(id){const t=tasks.find(x=>x.id===id);if(t)t.ex=!t.ex;renderSidebar();}
function addSub(tid){
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  const el=document.querySelector(`.task[data-id="${tid}"] .sub-add`);if(!el)return;
  el.outerHTML=`<div class="sub-input-row"><input class="sub-inline-input" id="sub-inp-${tid}" placeholder="subtask name…" onkeydown="subKey(event,${tid})"/><button class="sub-inline-ok" onclick="commitSub(${tid})">+</button><button class="sub-inline-cancel" onclick="renderSidebar()">✕</button></div>`;
  setTimeout(()=>{const i=document.getElementById('sub-inp-'+tid);if(i)i.focus();},30);
}
function subKey(e,tid){if(e.key==='Enter')commitSub(tid);if(e.key==='Escape')renderSidebar();}
function commitSub(tid){
  const inp=document.getElementById('sub-inp-'+tid);if(!inp)return;
  const name=inp.value.trim();if(!name)return;
  const t=tasks.find(x=>x.id===tid);if(!t)return;
  t.subs.push({id:nid++,name,done:false});t.ex=true;renderSidebar();
}
function delSub(tid,sid){const t=tasks.find(x=>x.id===tid);if(t)t.subs=t.subs.filter(s=>s.id!==sid);renderSidebar();}
function delTask(id){tasks=tasks.filter(x=>x.id!==id);renderSidebar();if(curView==='week')renderWeeklyView();}

function openAddTask(pri,day){
  editTaskId=null;window._pd=day!=null?day:null;
  document.getElementById('m-title').textContent='✨ Add task';
  document.getElementById('m-name').value='';
  document.getElementById('m-ws').value=curWS==='all'?'personal':curWS;
  document.getElementById('m-pri').value=pri==='done'?'todo':pri;
  document.getElementById('m-delbtn').style.visibility='hidden';
  document.getElementById('task-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-name').focus(),50);
}
function openEditTask(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;
  editTaskId=id;window._pd=undefined;
  document.getElementById('m-title').textContent='✏️ Edit task';
  document.getElementById('m-name').value=t.name;
  document.getElementById('m-ws').value=t.ws;
  document.getElementById('m-pri').value=t.done?'todo':t.pri;
  document.getElementById('m-delbtn').style.visibility='visible';
  document.getElementById('task-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-name').focus(),50);
}
function closeTaskModal(){document.getElementById('task-overlay').classList.remove('open');editTaskId=null;}
function deleteEditTask(){tasks=tasks.filter(x=>x.id!==editTaskId);closeTaskModal();renderSidebar();if(curView==='week')renderWeeklyView();}
function saveTaskModal(){
  const name=document.getElementById('m-name').value.trim();if(!name)return;
  const w=document.getElementById('m-ws').value,p=document.getElementById('m-pri').value;
  if(editTaskId!=null){const t=tasks.find(x=>x.id===editTaskId);if(t){t.name=name;t.ws=w;t.pri=p;t.done=false;}}
  else tasks.push({id:nid++,ws:w,pri:p,name,done:false,subs:[],ex:false,dayAssign:window._pd??null});
  window._pd=null;closeTaskModal();renderSidebar();if(curView==='week')renderWeeklyView();
}

function addDump(){
  const inp=document.getElementById('dump-input');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  dump.push({id:nid++,ws:curWS==='all'?'personal':curWS,text});inp.value='';renderSidebar();
  setTimeout(()=>{const i=document.getElementById('dump-input');if(i)i.focus();},50);
}
function delDump(id){dump=dump.filter(x=>x.id!==id);renderSidebar();}
function promoteDump(id){
  const d=dump.find(x=>x.id===id);if(!d)return;
  dump=dump.filter(x=>x.id!==id);editTaskId=null;window._pd=null;
  document.getElementById('m-title').textContent='✨ Turn into task';
  document.getElementById('m-name').value=d.text;
  document.getElementById('m-ws').value=d.ws;
  document.getElementById('m-pri').value='todo';
  document.getElementById('m-delbtn').style.visibility='hidden';
  document.getElementById('task-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('m-name').focus(),50);
  renderSidebar();
}

function renderSwatches(sel){
  evColorSel=sel||'purple';
  document.getElementById('ev-colors').innerHTML=COLORS.map(c=>`<div class="swatch${c.id===evColorSel?' sel':''}" style="background:${c.dot}" title="${c.id}" onclick="pickColor('${c.id}')"></div>`).join('');
}
function pickColor(id){evColorSel=id;renderSwatches(id);}
function selRepeat(val){repeatSel=val;document.querySelectorAll('.rchip').forEach(c=>c.classList.toggle('sel',c.dataset.r===val));}

function populateDaySelect(sel){
  const dates=getWeekDates(wkOff);
  document.getElementById('ev-day').innerHTML=dates.map((d,i)=>`<option value="${i}">${DAYS[i]} ${d.getDate()}</option>`).join('');
  document.getElementById('ev-day').value=String(sel||0);
}
function openAddEvent(day,h){
  editEvId=null;selRepeat('none');renderSwatches('purple');
  document.getElementById('ev-title').textContent='📅 Add event';
  document.getElementById('ev-name').value='';
  document.getElementById('ev-ws').value=curWS==='all'?'personal':curWS;
  document.getElementById('ev-delbtn').style.visibility='hidden';
  document.getElementById('ev-dur').value='1';
  populateDaySelect(day||0);
  document.getElementById('ev-start').value=fmtH(h!=null?snapH(h):9);
  document.getElementById('ev-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ev-name').focus(),50);
}
function openEditEvent(id){
  const e=calEvents.find(x=>x.id===id);if(!e)return;
  editEvId=id;selRepeat(e.repeat||'none');renderSwatches(e.color||'purple');
  document.getElementById('ev-title').textContent='✏️ Edit event';
  document.getElementById('ev-name').value=e.title;
  document.getElementById('ev-ws').value=e.ws;
  document.getElementById('ev-delbtn').style.visibility='visible';

  else{document.getElementById('ev-start').value=fmtH(e.sh);const dv=String(e.dur);document.getElementById('ev-dur').value=['0.25','0.5','0.75','1','1.5','2','3'].includes(dv)?dv:'1';}
  document.getElementById('ev-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('ev-name').focus(),50);
}
function closeEvModal(){document.getElementById('ev-overlay').classList.remove('open');editEvId=null;}
function deleteCalEvent(){calEvents=calEvents.filter(x=>x.id!==editEvId);closeEvModal();renderCal();}
function saveEvModal(){
  const title=document.getElementById('ev-name').value.trim();if(!title)return;
  const w=document.getElementById('ev-ws').value,day=+document.getElementById('ev-day').value;
  const durVal=document.getElementById('ev-dur').value,allday=durVal==='allday';
  const sh=allday?0:parseH(document.getElementById('ev-start').value);
  const dur=allday?0:parseFloat(durVal);
  if(editEvId!=null){const ev=calEvents.find(x=>x.id===editEvId);if(ev){ev.title=title;ev.ws=w;ev.day=day;ev.allday=allday;ev.sh=sh;ev.dur=dur;ev.repeat=repeatSel;ev.color=evColorSel;}}
  else calEvents.push({id:nid++,ws:w,title,day,sh,dur,allday,repeat:repeatSel,color:evColorSel});
  closeEvModal();renderCal();
}

function renderLegend(){
  const show=curWS==='all'?Object.entries(WS):[[curWS,WS[curWS]]];
  document.getElementById('legend').innerHTML=show.map(([,v])=>`<div class="leg-item" style="background:${v.bg};color:${v.dark}"><div style="width:7px;height:7px;border-radius:50%;background:${v.mid}"></div>${v.label}</div>`).join('');
}

function renderCal(){
  const dates=getWeekDates(wkOff);
  const mon=dates[0],sun=dates[6];
  const title=mon.getMonth()===sun.getMonth()?`${MONTHS[mon.getMonth()]} ${mon.getFullYear()}`:`${MONTHS[mon.getMonth()].slice(0,3)}–${MONTHS[sun.getMonth()].slice(0,3)} ${sun.getFullYear()}`;
  document.getElementById('cal-title').innerHTML=`${title} <span class="wk-tag">wk ${getWkNum(mon)}</span>`;
  document.getElementById('days-head').innerHTML=dates.map((d,i)=>`<div class="dhcell"><div class="dname">${DAYS[i]}</div><div class="dnum${isToday(d)?' today':''}">${d.getDate()}</div></div>`).join('');
  document.getElementById('allday-row').innerHTML=dates.map((_,di)=>{
    const ev=calEvents.filter(e=>e.allday&&e.day===di&&(curWS==='all'||e.ws===curWS));
    return `<div class="adcell" onclick="openAddAlldayEvent(${di})">
      ${ev.map(e=>{const c=getColor(e.color);return `<div class="adchip" style="background:${c.bg};color:${c.text};border:1px solid ${c.border}" onclick="event.stopPropagation();openEditEvent(${e.id})">${e.title}${e.repeat&&e.repeat!=='none'?' ↻':''}</div>`;}).join('')}
      <div style="font-size:9px;color:var(--txt3);padding:1px 2px">+</div>
    </div>`;
  }).join('');

  // ── FIX 2: const top=i*HH (no offset), with H_START=5 ──
  const totalH=(22-H_START)*HH+HH/2;
  document.getElementById('dscroll').innerHTML=dates.map((d,di)=>{
    const ev=calEvents.filter(e=>!e.allday&&e.day===di&&(curWS==='all'||e.ws===curWS));
    const lines=Array.from({length:22-H_START+1},(_,i)=>{
      const top=i*HH;
      return `<div class="hline" style="top:${top}px"></div><div class="hline half" style="top:${top+HH/2}px"></div>`;
    }).join('');
    const evs=ev.map(e=>{
      const c=getColor(e.color),top=hourToPx(e.sh),h=Math.max(e.dur*HH,22);
      return `<div class="cevent" style="top:${top}px;height:${h}px;background:${c.bg};color:${c.text};border-color:${c.border}" onclick="openEditEvent(${e.id})">
        <div>${e.title}</div>
        ${e.dur>=0.5?`<div style="font-size:9px;font-weight:400;opacity:.7">${fmtH(e.sh)} – ${fmtH(e.sh+e.dur)}</div>`:''}
        ${e.repeat&&e.repeat!=='none'?`<div class="repeat-badge">${repeatIcon(e.repeat)}</div>`:''}
        <button class="ev-del" onclick="event.stopPropagation();quickDelEvent(${e.id})">✕</button>
      </div>`;
    }).join('');
    const nowH=_TODAY.getHours()+_TODAY.getMinutes()/60;
    const now=wkOff===0&&isToday(d)?`<div class="now-line" style="top:${hourToPx(nowH)}px"><div class="now-dot"></div></div>`:'';
    return `<div class="dcol${isToday(d)?' today-col':''}" style="height:${totalH}px">${lines}${evs}${now}</div>`;
  }).join('');
  syncScroll();attachColEvents();
}

function openAddAlldayEvent(di){openAddEvent(di,null);document.getElementById('ev-dur').value='allday';}
function quickDelEvent(id){calEvents=calEvents.filter(x=>x.id!==id);renderCal();}
function syncScroll(){
  const ts=document.getElementById('tscroll'),ds=document.getElementById('dscroll');
  ts.onscroll=()=>ds.scrollTop=ts.scrollTop;
  ds.onscroll=()=>ts.scrollTop=ds.scrollTop;
  setTimeout(()=>{const nowH=_TODAY.getHours()+_TODAY.getMinutes()/60;const s=Math.max(0,(nowH-1-H_START)*HH);ds.scrollTop=s;ts.scrollTop=s;},60);
}
function shiftWeek(d){wkOff+=d;renderSidebar();if(curView==='cal')renderCal();else if(curView==='week')renderWeeklyView();}

function attachColEvents(){
  document.querySelectorAll('.dcol').forEach((col,di)=>{
    col.addEventListener('mousedown',e=>{
      if(e.target.closest('.cevent')||e.target.closest('.ev-del'))return;
      isDragging=true;dragDayIdx=di;dragCol=col;
      const st=document.getElementById('dscroll').scrollTop;
      dragStartH=snapH(pxToHour(e.clientY-col.getBoundingClientRect().top+st));
      ghostEl=document.createElement('div');ghostEl.className='ghost';
      ghostEl.style.cssText=`top:${hourToPx(dragStartH)}px;height:${HH*.5}px`;
      hintEl=document.createElement('div');hintEl.className='time-hint';
      hintEl.style.top=(hourToPx(dragStartH)+2)+'px';hintEl.textContent=fmtH(dragStartH);
      col.appendChild(ghostEl);col.appendChild(hintEl);e.preventDefault();
    });
  });
  document.removeEventListener('mousemove',onCalMove);
  document.removeEventListener('mouseup',onCalUp);
  document.addEventListener('mousemove',onCalMove,{passive:true});
  document.addEventListener('mouseup',onCalUp);
}
function onCalMove(e){
  if(!isDragging||!ghostEl||!dragCol)return;
  const st=document.getElementById('dscroll').scrollTop;
  const curH=snapH(pxToHour(e.clientY-dragCol.getBoundingClientRect().top+st));
  const sH=Math.min(dragStartH,curH),dur=Math.max(0.25,Math.max(dragStartH,curH)-sH);
  ghostEl.style.top=hourToPx(sH)+'px';ghostEl.style.height=(dur*HH)+'px';
  hintEl.style.top=(hourToPx(sH)+2)+'px';hintEl.textContent=fmtH(sH)+' – '+fmtH(sH+dur);
}
function onCalUp(e){
  if(!isDragging)return;
  isDragging=false;
  const st=document.getElementById('dscroll').scrollTop;
  const curH=snapH(pxToHour(e.clientY-(dragCol?dragCol.getBoundingClientRect().top:0)+st));
  const sH=snapH(Math.min(dragStartH,curH)),dur=Math.max(0.25,snapH(Math.max(dragStartH,curH))-sH);
  if(ghostEl){ghostEl.remove();ghostEl=null;}
  if(hintEl){hintEl.remove();hintEl=null;}
  dragCol=null;
  openAddEvent(dragDayIdx,sH);
  const kd=['0.25','0.5','0.75','1','1.5','2','3'];
  document.getElementById('ev-dur').value=kd.includes(String(dur))?String(dur):'1';
}

function renderWeeklyView(){
  const dates=getWeekDates(wkOff);
  const all=tasks.filter(t=>curWS==='all'||t.ws===curWS);
  const open=all.filter(t=>!t.done),done=all.filter(t=>t.done);
  const pct=all.length?Math.round(done.length/all.length*100):0;
  const pc={high:'#E24B4A',med:'#BA7517',low:'#185FA5',todo:'#b0acca',done:'#d4cff0'};
  let html=`<div class="wov-stats">
    <div class="wov-stat"><span class="wov-stat-num">${open.length}</span><span class="wov-stat-lbl">open tasks</span><div class="wov-stat-bar"><div class="wov-stat-fill" style="width:${100-pct}%;background:#E24B4A"></div></div></div>
    <div class="wov-stat"><span class="wov-stat-num">${done.length}</span><span class="wov-stat-lbl">done</span><div class="wov-stat-bar"><div class="wov-stat-fill" style="width:${pct}%"></div></div></div>
    <div class="wov-stat"><span class="wov-stat-num">${pct}%</span><span class="wov-stat-lbl">completion</span><div class="wov-stat-bar"><div class="wov-stat-fill" style="width:${pct}%;background:#1D9E75"></div></div></div>
    <div class="wov-stat"><span class="wov-stat-num">${all.filter(t=>t.pri==='high'&&!t.done).length}</span><span class="wov-stat-lbl">high priority left</span><div class="wov-stat-bar"><div class="wov-stat-fill" style="width:${all.length?all.filter(t=>t.pri==='high'&&!t.done).length/all.length*100:0}%;background:#E24B4A"></div></div></div>
  </div>
  <div class="wov-section-title">This week — drag tasks onto days</div>
  <div class="wov-grid">${dates.map((d,di)=>{
    const dt=open.filter(t=>t.dayAssign===di);
    return `<div class="wov-day" id="wov-${di}" ondragover="wovOver(event,${di})" ondragleave="wovLeave(${di})" ondrop="wovDrop(event,${di})">
      <div class="wov-day-head"><span class="wov-dname">${DAYS[di]}</span><div class="wov-dnum${isToday(d)?' today':''}">${d.getDate()}</div></div>
      <div class="wov-tasks">
        ${dt.map(t=>`<div class="wov-task">
          <div class="wov-chk${t.done?' done':''}" onclick="wovToggle(${t.id})"></div>
          <div class="wov-pri" style="background:${pc[t.pri]}"></div>
          <span class="wov-tname${t.done?' done':''}">${curWS==='all'?`<span class="ws-badge" style="background:${WS[t.ws].soft};color:${WS[t.ws].dark};font-size:8px">${WS[t.ws].label}</span>`:''}${t.name}</span>
          <button class="wov-del" onclick="wovUnassign(${t.id})">✕</button>
        </div>`).join('')}
        <div class="wov-drop-hint">drop here</div>
        ${!dt.length?`<div class="wov-empty">empty</div>`:''}
      </div>
    </div>`;
  }).join('')}</div>`;
  const unsched=open.filter(t=>t.dayAssign==null);
  if(unsched.length){
    html+=`<div class="wov-section-title" style="margin-top:18px">Unscheduled — drag onto a day</div>
    <div class="unsched-pills">${unsched.map(t=>`<div class="unsched-pill" draggable="true" data-id="${t.id}" ondragstart="pillStart(event,${t.id})" ondragend="pillEnd(event)">
      <div class="pri-pip" style="background:${pc[t.pri]}"></div>
      ${curWS==='all'?`<span class="ws-badge" style="background:${WS[t.ws].soft};color:${WS[t.ws].dark};font-size:9px">${WS[t.ws].label}</span>`:''}${t.name}
    </div>`).join('')}</div>`;
  }
  document.getElementById('weekly-view').innerHTML=html;
}
function pillStart(e,id){wovDragId=id;e.dataTransfer.setData('text/plain',String(id));setTimeout(()=>{const el=e.target;if(el)el.classList.add('dragging');},0);}
function pillEnd(e){document.querySelectorAll('.unsched-pill.dragging,.wov-day.drag-target').forEach(x=>x.classList.remove('dragging','drag-target'));}
function wovOver(e,di){e.preventDefault();document.getElementById('wov-'+di).classList.add('drag-target');}
function wovLeave(di){document.getElementById('wov-'+di).classList.remove('drag-target');}
function wovDrop(e,di){
  e.preventDefault();document.getElementById('wov-'+di).classList.remove('drag-target');
  const id=wovDragId||+e.dataTransfer.getData('text/plain');if(!id)return;
  const t=tasks.find(x=>x.id===id);if(t)t.dayAssign=di;
  wovDragId=null;renderWeeklyView();renderSidebar();
}
function wovToggle(id){const t=tasks.find(x=>x.id===id);if(t){t.done=!t.done;if(t.done)t.pri='done';}renderWeeklyView();renderSidebar();}
function wovUnassign(id){const t=tasks.find(x=>x.id===id);if(t)t.dayAssign=null;renderWeeklyView();renderSidebar();}

function renderFocusView(){
  const el=document.getElementById('focus-view');if(!el)return;
  const pinned=focusTaskId!=null?tasks.find(x=>x.id===focusTaskId):null;
  if(focusPickMode){
    const available=tasks.filter(t=>!t.done&&(curWS==='all'||t.ws===curWS));
    const pc={high:'#E24B4A',med:'#BA7517',low:'#185FA5',todo:'#b0acca'};
    el.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
      <span style="font-size:14px;font-weight:500;color:var(--txt)">Pick a task to focus on</span>
      <button class="focus-unpin" onclick="focusPickMode=false;renderFocusView()">Cancel</button>
    </div>
    <div class="focus-pick-list">
      ${available.map(t=>{const wc=WS[t.ws];return `<div class="focus-pick-item" onclick="pinFocus(${t.id})">
        <div class="focus-pick-pri" style="background:${pc[t.pri]||'#ccc'}"></div>
        <span class="focus-pick-name">${t.name}</span>
        <span class="focus-pick-ws" style="background:${wc.soft};color:${wc.dark}">${wc.label}</span>
      </div>`;}).join('')}
      ${!available.length?`<div style="color:var(--txt3);font-size:12px;padding:8px">No open tasks!</div>`:''}
    </div>`;
    return;
  }
  if(!pinned){
    el.innerHTML=`<div class="focus-empty">
      <div class="focus-empty-icon"><img src="https://raw.githubusercontent.com/coloredcaramel/plansy/main/sticker-purple-donut.png" style="width:48px;height:48px;object-fit:contain" onerror="this.outerHTML='🍩'"/></div>
      <div class="focus-empty-text">Nothing in focus yet~<br>Pick a task to get started!</div>
      <button class="focus-pick-btn" onclick="focusPickMode=true;renderFocusView()">
        <img src="https://raw.githubusercontent.com/coloredcaramel/plansy/main/heart-sticker-pink.png" style="width:14px;height:14px;object-fit:contain;vertical-align:middle" onerror="this.outerHTML='🌸'"/> Pick a task
      </button>
    </div>`;
    return;
  }
  const wc=WS[pinned.ws];
  const done=focusSteps.filter(s=>s.done).length;
  const pct=focusSteps.length?Math.round(done/focusSteps.length*100):0;
  el.innerHTML=`
    <div class="focus-card">
      <div class="focus-card-top">
        <div class="focus-ws-dot" style="background:${wc.mid}"></div>
        <div class="focus-task-name">${pinned.name}</div>
        <button class="focus-unpin" onclick="focusPickMode=true;renderFocusView()">Switch</button>
        <button class="focus-unpin" onclick="unpinFocus()">Unpin</button>
      </div>
      ${focusSteps.length?`<div class="focus-progress"><div class="focus-progress-fill" style="width:${pct}%"></div></div>`:''}
      <div class="focus-section-label">Checklist ${focusSteps.length?`<span style="font-weight:400;text-transform:none;letter-spacing:0;color:var(--txt3)">${done}/${focusSteps.length}</span>`:''}</div>
      ${focusSteps.map(s=>`<div class="focus-step-row">
        <div class="focus-chk${s.done?' done':''}" onclick="toggleStep(${s.id})"></div>
        <span class="focus-step-text${s.done?' done':''}">${s.text}</span>
        <button class="focus-step-del" onclick="delStep(${s.id})">✕</button>
      </div>`).join('')}
      <div class="focus-step-input-row">
        <input class="focus-step-input" id="fsi" placeholder="Add a step…" onkeydown="if(event.key==='Enter')addStep()"/>
        <button class="focus-add-step-btn" onclick="addStep()">+ Step</button>
      </div>
    </div>
    <div class="focus-card">
      <div class="focus-section-label">Notes</div>
      <textarea class="focus-notes" id="fni" placeholder="Jot anything down while you work…" oninput="focusNotes=this.value">${focusNotes}</textarea>
    </div>
    <button class="focus-done-btn" onclick="markFocusDone()">
      <img src="https://raw.githubusercontent.com/coloredcaramel/plansy/main/heart-sticker-pink.png" style="width:14px;height:14px;object-fit:contain;vertical-align:middle" onerror="this.outerHTML='🌸'"/> Mark task done
    </button>`;
}
function pinFocus(id){
  focusTaskId=id;focusPickMode=false;
  const t=tasks.find(x=>x.id===id);
  if(t&&t.subs&&t.subs.length&&!focusSteps.length)
    focusSteps=t.subs.map(s=>({id:nid++,text:s.name,done:s.done}));
  renderFocusView();
}
function unpinFocus(){focusTaskId=null;focusSteps=[];focusNotes='';focusPickMode=false;renderFocusView();}
function addStep(){
  const inp=document.getElementById('fsi');if(!inp)return;
  const text=inp.value.trim();if(!text)return;
  focusSteps.push({id:nid++,text,done:false});renderFocusView();
  setTimeout(()=>{const i=document.getElementById('fsi');if(i)i.focus();},30);
}
function toggleStep(id){const s=focusSteps.find(x=>x.id===id);if(s)s.done=!s.done;renderFocusView();}
function delStep(id){focusSteps=focusSteps.filter(x=>x.id!==id);renderFocusView();}
function markFocusDone(){
  const t=tasks.find(x=>x.id===focusTaskId);if(t){t.done=true;t.pri='done';}
  unpinFocus();renderSidebar();
}
